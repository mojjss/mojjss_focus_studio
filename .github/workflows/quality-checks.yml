name: Quality checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python syntax
        run: python -m compileall -q desktop_app
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check JavaScript syntax
        shell: bash
        run: find cloudflare_dashboard/functions cloudflare_dashboard/public -name '*.js' -print0 | xargs -0 -n1 node --check
